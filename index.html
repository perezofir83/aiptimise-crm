<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Aiptimise CRM</title>
<style>
  :root{--bg:#0f1115;--panel:#181b22;--line:#2a2f3a;--txt:#e8eaf0;--dim:#9aa3b2;--blue:#4f8cff;--green:#3ecf8e;--yellow:#ffd166;--red:#ff6b6b;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
  a{color:var(--blue);text-decoration:none}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 20px}
  header.top{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:5}
  header.top h1{font-size:16px;letter-spacing:.5px}
  header.top h1 span{color:var(--blue)}
  .hbtns{display:flex;gap:8px}
  button{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px}
  button.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  button.green{background:var(--green);border-color:var(--green);color:#08281a}
  table{width:100%;border-collapse:collapse;margin-top:14px}
  th{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.6px;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer}
  td{padding:10px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
  tr.row:hover{background:var(--panel);cursor:pointer}
  .tag{display:inline-block;font-size:10px;font-weight:700;border-radius:20px;padding:2px 9px;margin-left:8px;vertical-align:middle}
  .tag.intro{background:#2b3f66;color:#9cc0ff}.tag.resp{background:#5a4a15;color:var(--yellow)}.tag.meet{background:#14452e;color:var(--green)}.tag.custom{background:#3a2f4f;color:#cbb3ff}
  .score{font-weight:800}
  .pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;background:var(--panel);border:1px solid var(--line);margin:0 6px 6px 0}
  input[type=text],input[type=email],input[type=password]{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px 12px;font-size:14px;width:100%}
  .login{max-width:360px;margin:14vh auto;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px}
  .login h2{margin-bottom:4px}.login p{color:var(--dim);font-size:13px;margin-bottom:18px}
  .login .f{margin-bottom:12px}
  .err{color:var(--red);font-size:13px;margin-top:10px;min-height:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:10px}
  .kv{font-size:13px;color:var(--dim)}.kv b{display:block;color:var(--txt);font-size:14px;margin-top:2px}
  .crumb{color:var(--dim);font-size:13px;margin-bottom:6px;display:block}
  h2.page{font-size:22px}
  .sub{color:var(--dim);font-size:13px;margin-top:2px}
  .search{margin-top:16px}
  .otable td{font-size:13px}
  .otable input[type=text]{padding:6px 8px;font-size:13px}
  .muted{color:var(--dim);font-size:12px}
  .addrow{margin-top:10px}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:20}
  .modal .card{max-width:420px;width:92%}
  textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px;font-size:13px;min-height:70px}
  .flash{position:fixed;bottom:20px;right:20px;background:var(--green);color:#08281a;font-weight:700;padding:10px 18px;border-radius:10px;display:none;z-index:30}
</style>
</head>
<body>
<div id="app"></div>
<div class="flash" id="flash"></div>
<script>
/* ---------- state ---------- */
let DATA=null, KEY=null, CREDS=null;
const OV_KEY="aiptimise-crm-overlay", TOK_KEY="aiptimise-crm-token";
const $=s=>document.querySelector(s);
const app=$("#app");
const enc=new TextEncoder(), dec=new TextDecoder();
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const b64e=b=>btoa(String.fromCharCode(...new Uint8Array(b)));

async function deriveKey(email,pass,salt){
  const km=await crypto.subtle.importKey("raw",enc.encode(email.trim().toLowerCase()+":"+pass),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:200000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},true,["encrypt","decrypt"]);
}
async function loadData(email,pass){
  const blob=await (await fetch("data.enc.json?t="+Date.now())).json();
  const key=await deriveKey(email,pass,b64d(blob.salt));
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(blob.nonce)},key,b64d(blob.ct));
  DATA=JSON.parse(dec.decode(pt)); KEY=key; CREDS={email,pass};
  applyOverlay();
}
function overlay(){try{return JSON.parse(localStorage.getItem(OV_KEY)||"{}")}catch(e){return{}}}
function setOverlay(o){localStorage.setItem(OV_KEY,JSON.stringify(o))}
function applyOverlay(){
  const o=overlay();
  for(const p of DATA.people){ if(o[p.id]){ Object.assign(p.outreach,o[p.id].outreach||{}); p.custom=o[p.id].custom||p.custom; p.user_notes=o[p.id].user_notes??p.user_notes; } }
  for(const c of DATA.companies){ if(o["c:"+c.id]){ c.triage=o["c:"+c.id].triage; } }
  for(const s of (DATA.signals||[])){ if(o["s:"+s.id]){ s.status=o["s:"+s.id].status; } }
}
/* ---------- signals (playbooks action queue) ---------- */
const openSignals=()=> (DATA.signals||[]).filter(s=>s.status==="open"||!s.status);
const HEAT={hot:["🔥","var(--red)"],warm:["●","var(--yellow)"],cool:["●","var(--dim)"]};
function setSigStatus(id,v){
  const s=(DATA.signals||[]).find(x=>x.id===id); if(!s)return;
  s.status=v;
  const o=overlay(); o["s:"+id]={status:v,ts:Date.now()}; setOverlay(o);
  flash("Saved locally — use Sync to publish"); route();
}
function emailStatusTag(p){
  return p.email_status==="found-public"?`<span class="tag meet" title="${p.email||""}">✉️ verified</span>`:"";
}
function companyEmailTag(c){
  const ppl=(c.people||[]).map(pid=>DATA.people.find(p=>p.id===pid)).filter(Boolean);
  return ppl.some(p=>p.email_status==="found-public")?`<span class="tag meet">✉️</span>`:"";
}
function sigChips(c){
  if(!c.signal_ids||!c.signal_ids.length)return "";
  const sigs=openSignals().filter(s=>c.signal_ids.includes(s.id));
  return sigs.map(s=>`<span class="tag" style="background:#4a1d1d;color:#ffb3b3" title="${s.label}: ${s.summary.replace(/"/g,'&quot;')}">${s.icon} ${s.label}</span>`).join("");
}
function setTriage(id,v){
  const c=DATA.companies.find(x=>x.id===id); c.triage=v||undefined;
  const o=overlay(); o["c:"+id]={triage:c.triage,ts:Date.now()}; setOverlay(o);
  flash("Saved locally — use Sync to publish"); route();
}
const TRIAGE={relevant:["Relevant","meet"],not_relevant:["Not relevant","custom"],tomorrow:["Save for tomorrow","resp"],send_today:["Send today","intro"]};
function triageSelect(c){
  return `<select onclick="event.stopPropagation()" onchange="setTriage('${c.id}',this.value)"
    style="background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:12px">
    <option value="">— triage —</option>
    ${Object.entries(TRIAGE).map(([k,[lbl]])=>`<option value="${k}" ${c.triage===k?"selected":""}>${lbl}</option>`).join("")}
  </select>`;
}
const triageTag=c=>c.triage?`<span class="tag ${TRIAGE[c.triage][1]}">${TRIAGE[c.triage][0]}</span>`:"";
function saveEdit(p){
  const o=overlay();
  o[p.id]={outreach:p.outreach,custom:p.custom||[],user_notes:p.user_notes||"",ts:Date.now()};
  setOverlay(o); flash("Saved locally — use Sync to publish");
}
function flash(msg){const f=$("#flash");f.textContent=msg;f.style.display="block";setTimeout(()=>f.style.display="none",2200)}

/* ---------- tags ---------- */
function personStage(p){
  const o=p.outreach||{};
  if(o.meeting_set)return{cls:"meet",label:"Meeting set"};
  if(o.response_received)return{cls:"resp",label:"Response received"};
  if(o.intro_sent)return{cls:"intro",label:"Intro sent"};
  const c=(p.custom||[]).find(x=>x.checked);
  if(c)return{cls:"custom",label:c.label};
  return null;
}
function companyStage(c){
  const order={"Meeting set":3,"Response received":2,"Intro sent":1};
  let best=null;
  for(const pid of c.people){const p=DATA.people.find(x=>x.id===pid);if(!p)continue;
    const s=personStage(p); if(s&&(!best||((order[s.label]||0.5)>(order[best.label]||0.5))))best=s;}
  return best;
}
const tagHtml=s=>s?`<span class="tag ${s.cls}">${s.label}</span>`:"";

/* ---------- views ---------- */
function shell(inner){
  const nSig=DATA?openSignals().length:0;
  app.innerHTML=`<header class="top"><h1>AIPTIMISE <span>CRM</span></h1>
   <div class="hbtns"><button onclick="location.hash='#/'">Dashboard</button>
   <button onclick="location.hash='#/actions'" style="${nSig?"border-color:var(--red);color:#ffb3b3;font-weight:700":""}">⚡ Actions${nSig?` (${nSig})`:""}</button>
   <button onclick="syncToGitHub()" class="green">Sync to GitHub</button>
   <button onclick="showSettings()">Settings</button></div></header>
   <div class="wrap">${inner}</div>`;
}
let sortBy="crm_score", sortDir=-1;
const ICP_BADGE={"above-cap":["Above $20M cap","resp"],"below-floor":["Below $500K","custom"],"thin-catalog":["Catalog <500","custom"],"fit-unverified":["Revenue unverified","intro"],"not-shopify":["Not Shopify","custom"]};
function icpHtml(c){const b=ICP_BADGE[c.icp];return b?`<span class="tag ${b[1]}" title="Yoni's ICP: catalog 500+, revenue $0.5M–$20M">${b[0]}</span>`:""}
function usHtml(c){
  const flag=c.us_based===true?"🇺🇸 Yes":c.us_based===false?"No":"?";
  return c.us_note?`<span title="${c.us_note}">${flag} ⚠️</span>`:flag;
}
function dashboard(){
  const q=(window._q||"").toLowerCase();
  let rows=DATA.companies.filter(c=>!q||c.name.toLowerCase().includes(q)||c.domain.includes(q)||c.niche.toLowerCase().includes(q));
  if(!window._showAll) rows=rows.filter(c=>c.icp==="fit"||c.icp==="fit-unverified");
  const counts={};for(const c of DATA.companies)if(c.triage)counts[c.triage]=(counts[c.triage]||0)+1;
  if(window._triage) rows=rows.filter(c=>c.triage===window._triage);
  rows.sort((a,b)=>{let va=a[sortBy],vb=b[sortBy];
    if(sortBy==="ai"){va=a.ai_ready.score??999;vb=b.ai_ready.score??999}
    if(sortBy==="catalog"){va=a.catalog.variants||0;vb=b.catalog.variants||0}
    if(typeof va==="string")return sortDir*va.localeCompare(vb||"");
    return sortDir*((va??-1)-(vb??-1));});
  shell(`<h2 class="page">Lead Dashboard</h2>
  <div class="sub">${rows.length} shown of ${DATA.companies.length} Shopify companies · ICP: catalog 500+, revenue $0.5M–$20M, US market · click a row</div>
  <div class="search" style="display:flex;gap:12px;align-items:center">
    <input type="text" style="flex:1" placeholder="Search company / niche..." value="${window._q||""}" oninput="window._q=this.value;dashboard()">
    <label class="muted" style="white-space:nowrap"><input type="checkbox" ${window._showAll?"checked":""} onchange="window._showAll=this.checked;dashboard()"> Show non-ICP (above cap etc.)</label>
  </div>
  <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
    <button class="${!window._triage?"primary":""}" onclick="window._triage=null;dashboard()">All</button>
    ${Object.entries(TRIAGE).map(([k,[lbl]])=>`<button class="${window._triage===k?"primary":""}" onclick="window._triage='${k}';dashboard()">${lbl} (${counts[k]||0})</button>`).join("")}
  </div>
  <table><thead><tr>
    <th>Triage</th>
    <th onclick="setSort('name')">Company</th><th onclick="setSort('revenue')">Revenue (est)</th>
    <th onclick="setSort('catalog')">Catalog</th><th onclick="setSort('ai')">AI-Ready</th>
    <th>US</th>
    <th onclick="setSort('crm_score')">Score</th></tr></thead><tbody>
  ${rows.map(c=>`<tr class="row" onclick="location.hash='#/company/${c.id}'">
    <td>${triageSelect(c)}</td>
    <td><b>${c.name}</b>${tagHtml(companyStage(c))}${triageTag(c)}${icpHtml(c)}${sigChips(c)}${companyEmailTag(c)}<div class="muted">${c.domain} · ${c.niche}</div></td>
    <td>${c.revenue||"—"}</td>
    <td>${c.catalog.label}</td>
    <td>${c.ai_ready.label}${c.ai_ready.llms_txt?"":" · no llms.txt"}</td>
    <td>${usHtml(c)}</td>
    <td class="score" style="color:${c.crm_score>=75?"var(--green)":c.crm_score>=55?"var(--yellow)":"var(--dim)"}">${c.crm_score}</td>
  </tr>`).join("")}</tbody></table>`);
}
function setSort(k){if(sortBy===k)sortDir*=-1;else{sortBy=k;sortDir=-1}dashboard()}

const PB_NAMES={"app-review-harvest":"🧩 Weak tool","hiring-signal":"📣 Hiring","engagement":"💬 Engagement","fresh-migration":"🚚 Migration"};
function actionsPage(){
  const all=DATA.signals||[];
  let rows=all.filter(s=>window._sigDone?(s.status!=="open"&&s.status):(s.status==="open"||!s.status));
  if(window._sigPb) rows=rows.filter(s=>s.playbook===window._sigPb);
  const counts={};for(const s of all)if(s.status==="open"||!s.status)counts[s.playbook]=(counts[s.playbook]||0)+1;
  const heatRank={hot:0,warm:1,cool:2};
  rows.sort((a,b)=>(heatRank[a.heat]??3)-(heatRank[b.heat]??3)||String(b.date||"").localeCompare(String(a.date||"")));
  shell(`<h2 class="page">⚡ Action Queue</h2>
  <div class="sub">Playbook signals — each row is a task: who, why now, and the angle. Mark Done when handled.</div>
  <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <button class="${!window._sigPb?"primary":""}" onclick="window._sigPb=null;actionsPage()">All (${all.filter(s=>s.status==="open"||!s.status).length})</button>
    ${Object.entries(PB_NAMES).map(([k,lbl])=>`<button class="${window._sigPb===k?"primary":""}" onclick="window._sigPb='${k}';actionsPage()">${lbl} (${counts[k]||0})</button>`).join("")}
    <label class="muted" style="margin-left:auto;white-space:nowrap"><input type="checkbox" ${window._sigDone?"checked":""} onchange="window._sigDone=this.checked;actionsPage()"> Show handled</label>
  </div>
  ${rows.length?rows.map(s=>{
    const h=HEAT[s.heat]||HEAT.cool;
    const comp=s.company_id?`<a href="#/company/${s.company_id}"><b>${s.company||""}</b></a>`:`<b>${s.company||""}</b><span class="tag custom" title="Not in CRM yet — verify ICP then add">new</span>`;
    const who=s.person?` · ${s.person_id?`<a href="#/person/${s.person_id}">${s.person}</a>`:s.person}`:"";
    return `<div class="card" style="border-left:3px solid ${h[1]}">
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
        <div>
          <span style="color:${h[1]};font-weight:700">${s.heat==="hot"?"🔥 HOT":s.heat.toUpperCase()}</span>
          <span class="tag intro">${s.icon} ${s.label}</span>
          &nbsp;${comp}${who}
          <div style="margin-top:8px;font-size:14px;line-height:1.5">${s.summary||""}</div>
          <div style="margin-top:6px;font-size:13px;color:var(--green)">➜ ${s.action||""}</div>
          <div class="muted" style="margin-top:6px">${s.date||""}${s.url?` · <a href="${s.url}" target="_blank" rel="noopener">source</a>`:""}${s.icp_guess?` · ICP: ${s.icp_guess}`:""}</div>
        </div>
        <select onchange="setSigStatus('${s.id}',this.value)"
          style="background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:12px;flex-shrink:0">
          <option value="open" ${(!s.status||s.status==="open")?"selected":""}>Open</option>
          <option value="done" ${s.status==="done"?"selected":""}>✓ Done</option>
          <option value="dismissed" ${s.status==="dismissed"?"selected":""}>✗ Dismiss</option>
        </select>
      </div></div>`;
  }).join(""):`<div class="card muted">No open signals — playbook runs will fill this queue.</div>`}`);
}

function companyPage(id){
  const c=DATA.companies.find(x=>x.id===id); if(!c)return dashboard();
  const ppl=c.people.map(pid=>DATA.people.find(p=>p.id===pid)).filter(Boolean);
  shell(`<a class="crumb" href="#/">&larr; Dashboard</a>
  <h2 class="page">${c.name}${tagHtml(companyStage(c))}${triageTag(c)}</h2>
  <div class="sub" style="display:flex;gap:12px;align-items:center">${c.niche} · ${c.hq||""} · Shopify &nbsp; ${triageSelect(c)}</div>
  <div class="card"><div class="grid">
    <div class="kv">Revenue (est)<b>${c.revenue||"—"}</b></div>
    <div class="kv">Catalog<b>${c.catalog.label}</b></div>
    <div class="kv">AI-Ready<b>${c.ai_ready.label} ${c.ai_ready.llms_txt?"(has llms.txt!)":"(no llms.txt)"}</b></div>
    <div class="kv">CRM Score<b>${c.crm_score}</b></div>
    <div class="kv">Founded<b>${c.founded||"—"}</b></div>
    <div class="kv">Employees (est)<b>${c.employees||"—"}</b></div>
    <div class="kv">Ownership<b>${c.ownership||"—"}</b></div>
    <div class="kv">robots.txt vs AI<b>${c.ai_ready.robots||"—"}</b></div>
    <div class="kv">US-based<b>${usHtml(c)}${c.us_note?`<div class="muted" style="font-weight:400">${c.us_note}</div>`:""}</b></div>
    <div class="kv">ICP fit<b>${c.icp==="fit"?"✓ In ICP":c.icp==="fit-unverified"?"Likely (revenue unverified)":ICP_BADGE[c.icp]?ICP_BADGE[c.icp][0]:c.icp}</b></div>
  </div></div>
  ${(c.signal_ids||[]).length?`<div class="card" style="border-left:3px solid var(--red)"><h3>⚡ Signals</h3>
    ${(DATA.signals||[]).filter(s=>c.signal_ids.includes(s.id)).map(s=>`
      <div style="margin-top:10px;font-size:14px">${s.icon} <b>${s.label}</b> <span class="muted">(${s.heat} · ${s.date||""}${s.status&&s.status!=="open"?" · "+s.status:""})</span>
      <div style="margin-top:3px">${s.summary||""}</div>
      <div style="margin-top:3px;color:var(--green);font-size:13px">➜ ${s.action||""}</div></div>`).join("")}
    <div style="margin-top:12px"><a href="#/actions">Open Action Queue →</a></div></div>`:""}
  <div class="card"><h3>What they do</h3><p style="margin-top:8px;font-size:14px;line-height:1.6">${c.about||"—"}</p>
  ${c.history?`<p class="muted" style="margin-top:6px">${c.history}</p>`:""}</div>
  <div class="card"><h3>Links</h3><div style="margin-top:10px">
    ${Object.entries(c.links).map(([k,v])=>`<a class="pill" href="${v}" target="_blank" rel="noopener">${k==="email"?"✉️ "+v.replace("mailto:",""):k}</a>`).join("")}
  </div></div>
  <div class="card"><h3>People (${ppl.length})</h3>
    ${ppl.length?`<table><tbody>${ppl.map(p=>`<tr class="row" onclick="location.hash='#/person/${p.id}'">
      <td><b>${p.name}</b>${tagHtml(personStage(p))}<div class="muted">${p.title}</div></td>
      <td class="muted">${p.role_bucket||""}</td></tr>`).join("")}</tbody></table>`
    :`<p class="muted" style="margin-top:8px">No named contacts yet — LinkedIn verification pending.</p>`}</div>`);
}

function personPage(id){
  const p=DATA.people.find(x=>x.id===id); if(!p)return dashboard();
  p.custom=p.custom||[];
  const o=p.outreach;
  shell(`<a class="crumb" href="#/company/${p.company_id}">&larr; ${p.company}</a>
  <h2 class="page">${p.name}${tagHtml(personStage(p))}${emailStatusTag(p)}</h2>
  <div class="sub">${p.title}</div>
  <div class="card"><h3>Profile</h3><div class="grid" style="margin-top:10px">
    <div class="kv">Email<b>${p.email?`<a href="mailto:${p.email}">${p.email}</a> ${emailStatusTag(p)}${p.email_source?`<div class="muted" style="font-weight:400">via ${p.email_source}${p.email_source_url?` · <a href="${p.email_source_url}" target="_blank" rel="noopener">source</a>`:""}</div>`:""}`:"—"}</b></div>
    <div class="kv">Role bucket<b>${p.role_bucket||"—"}</b></div>
    <div class="kv">LinkedIn<b>${p.linkedin?`<a href="${p.linkedin}" target="_blank" rel="noopener">Open profile</a>`:"—"}</b></div>
    <div class="kv">Source<b>${p.source||"—"}</b></div></div>
    ${p.notes?`<p class="muted" style="margin-top:10px">${p.notes}</p>`:""}
    <div style="margin-top:8px">${(p.links||[]).map(l=>`<a class="pill" href="${l}" target="_blank" rel="noopener">${new URL(l).hostname}</a>`).join("")}</div>
  </div>
  <div class="card"><h3>Outreach</h3>
  <table class="otable"><tbody>
    <tr><td><label><input type="checkbox" ${o.intro_sent?"checked":""} onchange="tog('${p.id}','intro_sent',this.checked)"> Intro sent</label></td></tr>
    <tr><td><label><input type="checkbox" ${o.response_received?"checked":""} onchange="tog('${p.id}','response_received',this.checked)"> Response received</label></td></tr>
    <tr><td><label><input type="checkbox" ${o.meeting_set?"checked":""} onchange="tog('${p.id}','meeting_set',this.checked)"> Meeting set</label></td></tr>
    ${p.custom.map((c,i)=>`<tr><td><label><input type="checkbox" ${c.checked?"checked":""} onchange="togCustom('${p.id}',${i},this.checked)"> ${c.label}</label></td></tr>`).join("")}
    <tr><td>Status: <input type="text" style="width:70%" value="${o.status||""}" onchange="setStatus('${p.id}',this.value)" placeholder="free text..."></td></tr>
  </tbody></table>
  <div class="addrow"><button onclick="addCustom('${p.id}')">+ Add checkbox</button></div>
  <div style="margin-top:14px"><div class="muted" style="margin-bottom:4px">Notes</div>
  <textarea onchange="setNotes('${p.id}',this.value)">${p.user_notes||""}</textarea></div>
  </div>`);
}
function findP(id){return DATA.people.find(x=>x.id===id)}
function tog(id,f,v){const p=findP(id);p.outreach[f]=v;saveEdit(p);personPage(id)}
function togCustom(id,i,v){const p=findP(id);p.custom[i].checked=v;saveEdit(p);personPage(id)}
function addCustom(id){const l=prompt("Checkbox label:");if(!l)return;const p=findP(id);(p.custom=p.custom||[]).push({label:l,checked:false});saveEdit(p);personPage(id)}
function setStatus(id,v){const p=findP(id);p.outreach.status=v;saveEdit(p)}
function setNotes(id,v){const p=findP(id);p.user_notes=v;saveEdit(p)}

/* ---------- settings & sync ---------- */
function showSettings(){
  const m=document.createElement("div");m.className="modal";
  m.innerHTML=`<div class="card"><h3>Settings</h3>
   <p class="muted" style="margin:8px 0">GitHub token (repo scope) — used only by "Sync to GitHub", stored in this browser only.</p>
   <input type="password" id="tok" value="${localStorage.getItem(TOK_KEY)||""}" placeholder="ghp_...">
   <div style="margin-top:12px;display:flex;gap:8px">
    <button class="primary" onclick="localStorage.setItem('${TOK_KEY}',document.getElementById('tok').value);this.closest('.modal').remove();flash('Token saved')">Save</button>
    <button onclick="this.closest('.modal').remove()">Close</button>
    <button onclick="localStorage.removeItem('${OV_KEY}');location.reload()" style="margin-left:auto;color:var(--red)">Reset local edits</button>
   </div></div>`;
  document.body.appendChild(m);
}
async function syncToGitHub(){
  const tok=localStorage.getItem(TOK_KEY);
  if(!tok)return alert("Set a GitHub token in Settings first.");
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const key=await deriveKey(CREDS.email,CREDS.pass,salt);
  const nonce=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv:nonce},key,enc.encode(JSON.stringify(DATA)));
  const blob=JSON.stringify({v:1,kdf:"PBKDF2-SHA256-200000",salt:b64e(salt),nonce:b64e(nonce),ct:b64e(ct)});
  const repo="perezofir83/aiptimise-crm", path="data.enc.json";
  const meta=await (await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{headers:{Authorization:"Bearer "+tok}})).json();
  const res=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{method:"PUT",headers:{Authorization:"Bearer "+tok},
    body:JSON.stringify({message:"crm: update data ("+new Date().toISOString()+")",content:btoa(unescape(encodeURIComponent(blob))),sha:meta.sha})});
  if(res.ok){localStorage.removeItem(OV_KEY);flash("Synced to GitHub ✓")}else alert("Sync failed: "+res.status);
}

/* ---------- router & login ---------- */
function route(){
  if(!DATA)return login();
  const h=location.hash;
  if(h.startsWith("#/company/"))return companyPage(h.split("/")[2]);
  if(h.startsWith("#/person/"))return personPage(h.split("/")[2]);
  if(h.startsWith("#/actions"))return actionsPage();
  dashboard();
}
function login(){
  app.innerHTML=`<div class="login"><h2>AIPTIMISE <span style="color:var(--blue)">CRM</span></h2>
  <p>Sign in to decrypt the lead database.</p>
  <div class="f"><input type="email" id="em" placeholder="Email" autocomplete="username"></div>
  <div class="f"><input type="password" id="pw" placeholder="Password" autocomplete="current-password"></div>
  <button class="primary" style="width:100%" onclick="doLogin()">Sign in</button>
  <div class="err" id="lerr"></div></div>`;
  $("#pw").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
}
async function doLogin(){
  try{await loadData($("#em").value,$("#pw").value);route()}
  catch(e){$("#lerr").textContent="Wrong email or password."}
}
window.addEventListener("hashchange",route);
route();
</script>
